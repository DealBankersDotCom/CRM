<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,interactive-widget=resizes-content" />
<title>DealBankers • Live Fulfillment Tracker</title>
<link rel="icon" type="image/jpeg" href="icon (1).jpg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
<style>
:root{
  --bg1:#08111a;--bg2:#102534;--bg3:#11425a;
  --line:#24495f;--text:#eef6ff;--muted:#c0d4e6;--accent:#2b74ff;
  --good:#13b981;--warn:#f59e0b;--bad:#ef4444;--hot:#ff4444;
  --glass:rgba(255,255,255,.07);
  --shadow:0 28px 70px rgba(0,0,0,.55);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;}
body{
  margin:0;font-family:Inter,system-ui,Arial;color:var(--text);
  background:
    radial-gradient(circle at top center, rgba(43,116,255,.15), transparent 40%),
    linear-gradient(135deg,var(--bg1),var(--bg2) 60%,var(--bg3));
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.header{
  width:100%;
  display:flex;justify-content:center;align-items:center;
  padding:20px;border-bottom:1px solid rgba(255,255,255,.1);
  background:rgba(8,17,26,0.8);
  backdrop-filter: blur(10px);
  position:sticky;top:0;z-index:50;
}
.header .brand{display:flex;align-items:center;gap:10px;font-weight:900;letter-spacing:.05em;font-size:18px;}
.header .brand .dot{width:12px;height:12px;border-radius:50%;background:linear-gradient(180deg,#4da3ff,#1f5eff);box-shadow:0 0 14px rgba(43,116,255,.65);}

.container{
  max-width:700px;
  width:100%;
  padding:24px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.card{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.1);
  border-radius:20px;
  padding:24px;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.job-title{font-size:24px;font-weight:900;color:#fff;margin-bottom:8px;}
.job-meta{font-size:14px;color:var(--muted);display:flex;gap:16px;flex-wrap:wrap;}
.job-meta span{display:flex;align-items:center;gap:6px;}

.hr{height:1px;background:rgba(255,255,255,.1);margin:20px 0;}

.tracker-container{padding:20px 0;position:relative;}
.tracker-progress{display:flex;justify-content:space-between;position:relative;margin-bottom:10px;}
.tracker-progress::before{content:'';position:absolute;top:20px;left:10px;right:10px;height:4px;background:rgba(255,255,255,0.1);z-index:1;border-radius:2px;}
.tracker-progress-bar{position:absolute;top:20px;left:10px;height:4px;background:var(--accent);z-index:2;border-radius:2px;transition:width 0.4s cubic-bezier(0.4, 0, 0.2, 1);}
.tracker-step{position:relative;z-index:3;display:flex;flex-direction:column;align-items:center;width:50px;}
.tracker-icon{width:44px;height:44px;border-radius:50%;background:#0d1f2d;border:2px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:20px;transition:all 0.3s ease;}
.tracker-step.active .tracker-icon{border-color:var(--accent);background:var(--accent);box-shadow:0 0 15px rgba(43,116,255,.5);}
.tracker-step.completed .tracker-icon{border-color:var(--good);background:var(--good);color:white;}
.tracker-label{font-size:11px;text-align:center;margin-top:8px;color:var(--muted);font-weight:600;}
.tracker-step.active .tracker-label{color:#fff;font-weight:800;}

.doc-upload-area{
  border:2px dashed rgba(255,255,255,.2);
  border-radius:16px;
  padding:30px;
  text-align:center;
  background:rgba(0,0,0,.2);
  cursor:pointer;
  transition:all 0.2s ease;
}
.doc-upload-area:hover{border-color:var(--accent);background:rgba(43,116,255,.05);}
.doc-upload-area p{margin:10px 0 0 0;font-size:13px;color:var(--muted);}
.upload-btn{display:inline-block;padding:8px 16px;background:var(--accent);color:#fff;border-radius:8px;font-weight:700;font-size:13px;margin-top:12px;}

.chat-box{
  display:flex;flex-direction:column;gap:12px;
  padding:16px;background:rgba(0,0,0,.2);
  border-radius:16px;border:1px solid rgba(255,255,255,.08);
  height:300px;overflow-y:auto;
}
.chat-item{padding:12px;border-radius:12px;max-width:85%;font-size:13px;line-height:1.4;}
.chat-me{align-self:flex-end;background:rgba(43,116,255,.15);border:1px solid rgba(43,116,255,.3);color:#fff;border-bottom-right-radius:2px;}
.chat-them{align-self:flex-start;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--text);border-bottom-left-radius:2px;}
.chat-input-wrapper{display:flex;gap:10px;margin-top:12px;}
.chat-input{flex:1;background:#0d1f2d;border:1px solid #254a63;color:#fff;border-radius:10px;padding:12px;font-size:14px;outline:none;font-family:inherit;}
.chat-input:focus{border-color:var(--accent);}
.chip{padding:10px 20px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-weight:800;cursor:pointer;}
.chip:hover{background:#1a5bdf;}

.loader{display:flex;justify-content:center;align-items:center;height:50vh;flex-direction:column;gap:16px;color:var(--muted);}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin { to { transform: rotate(360deg); } }

.error-state{text-align:center;padding:40px;color:var(--bad);background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:16px;}

.photo-thumb {
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
    aspect-ratio: 1;
    background: #000;
}
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.2s ease;}
.photo-thumb img:hover { transform: scale(1.05); }
.photo-label {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.7);
    color: #fff;
    font-size: 10px;
    padding: 6px 4px;
    text-align: center;
    font-weight: 700;
}
</style>
</head>
<body>

<header class="header">
  <div class="brand"><span class="dot"></span><span>DEALBANKERS • Fulfillment</span></div>
</header>

<div class="container" id="mainContainer">
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <div>Securely loading your project...</div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="config.js"></script>

<script>
const esc = (s) => String(s || "").replace(/[&<>"']/g, m => ({'&': '&', '<': '<', '>': '>', '"': '"', "'": "'"}[m]));

// URL Parser to transform raw links into clickable buttons in the chat
window.linkify = function(text) {
    const urlRegex = /(https?:\/\/[^\s]+)/g;
    return text.replace(urlRegex, function(url) {
        return `<a href="${url}" target="_blank" style="color:var(--accent);text-decoration:underline;font-weight:700;word-break:break-all;">${url}</a>`;
    });
};

(function ensureFirebaseInit(){
    try{
        if(!firebase.apps || !firebase.apps.length){
            firebase.initializeApp(window.firebaseConfig);
        }
    }catch(e){console.error("Firebase init error", e);}
})();

const db = firebase.database();
let storage;
try { storage = firebase.storage(); } catch(e) { console.warn("Firebase Storage not initialized."); }

const urlParams = new URLSearchParams(window.location.search);
const JOB_ID = urlParams.get('id');
const PORTAL_URL = window.location.href;

const SERVICE_STEPS = [ {id:'Not Left',icon:'🏠'}, {id:'En Route',icon:'🚚'}, {id:'Arrived',icon:'📍'}, {id:'Working',icon:'🔨'}, {id:'Completed',icon:'✅'} ];
const BID_STEPS = [ {id:'Sourcing',icon:'🔍'}, {id:'Quoted',icon:'📄'}, {id:'Review',icon:'👀'}, {id:'Submitted',icon:'📤'}, {id:'Awarded',icon:'🏆'} ];

if(!JOB_ID) {
    document.getElementById('mainContainer').innerHTML = `
        <div class="error-state">
            <h2 style="margin:0 0 10px 0;">Invalid Link</h2>
            <p>No project ID was provided. Please check the link sent by your DealBankers representative.</p>
        </div>`;
} else {
    db.ref(`jobs/${JOB_ID}`).on('value', (snap) => {
        const job = snap.val();
        if(!job) {
            document.getElementById('mainContainer').innerHTML = `
                <div class="error-state">
                    <h2 style="margin:0 0 10px 0;">Project Not Found</h2>
                    <p>This project may have been removed or the ID is incorrect.</p>
                </div>`;
            return;
        }
        renderDashboard(job);
        loadChat();
        loadPhotos();
    }, (error) => {
        document.getElementById('mainContainer').innerHTML = `
            <div class="error-state">
                <h2 style="margin:0 0 10px 0;">Access Denied</h2>
                <p>You do not have permission to view this database node. Check security rules.</p>
            </div>`;
    });
}

function renderDashboard(job) {
    const isEnterprise = job.jobType === 'enterprise';
    const steps = isEnterprise ? BID_STEPS : SERVICE_STEPS;
    const currentStatus = job.executionStatus || steps[0].id;
    
    const stepIdx = steps.findIndex(s => s.id === currentStatus); 
    const prog = Math.max(0, (stepIdx / (steps.length - 1)) * 100); 
    
    let stepsHtml = "";
    steps.forEach((s, idx) => {
        const statusClass = idx < stepIdx ? 'completed' : (idx === stepIdx ? 'active' : '');
        stepsHtml += `
        <div class="tracker-step ${statusClass}">
            <div class="tracker-icon">${s.icon}</div>
            <div class="tracker-label">${s.id}</div>
        </div>`;
    });

    document.getElementById('mainContainer').innerHTML = `
        <div class="card">
            <div class="job-title">${esc(job.title || 'Project Overview')}</div>
            <div class="job-meta">
                <span><b>Trade:</b> ${esc(job.trade)}</span>
                <span><b>Location:</b> ${esc(job.city || '')} ${esc(job.zip || '')}</span>
                <span><b>Target:</b> ${esc(job.date || 'TBD')}</span>
            </div>
            <div class="hr"></div>
            <div style="font-size:14px;line-height:1.5;color:var(--muted);">
                <b>Scope of Work:</b><br/>
                ${esc(job.desc || 'No public description provided.').replace(/\n/g, '<br/>')}
            </div>
        </div>

        <div class="card">
            <h3 style="margin:0 0 16px 0;color:#fff;">Live Fulfillment Tracker</h3>
            <div class="tracker-container">
                <div class="tracker-progress">
                    <div class="tracker-progress-bar" style="width:${prog}%"></div>
                    ${stepsHtml}
                </div>
            </div>
            <div style="text-align:center;margin-top:16px;font-size:12px;color:var(--good);font-weight:700;letter-spacing:0.05em;text-transform:uppercase;">
                STATUS: ${esc(currentStatus)}
            </div>
        </div>

        <div class="card">
            <h3 style="margin:0 0 16px 0;color:#fff;">Job Site Photos</h3>
            <p style="font-size:13px;color:var(--muted);margin-top:0;">Upload progress photos directly from your device. These instantly notify the Project Manager.</p>
            <div style="display:flex; gap:10px; margin:16px 0;">
                <select id="photoStage" class="chat-input" style="flex:1;">
                    <option value="Pre-Job">Pre-Job Photo</option>
                    <option value="During Job">During Job Photo</option>
                    <option value="Post-Job">Post-Job Photo</option>
                </select>
                <button class="chip primary" style="white-space:nowrap;" onclick="document.getElementById('photoInput').click()">📸 Upload</button>
                <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none;" onchange="handlePhotoUpload(event)">
            </div>
            <div id="photoGallery" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(110px, 1fr)); gap:12px;">
                <div style="grid-column:1/-1;font-size:12px;color:var(--muted);">Loading photos...</div>
            </div>
        </div>

        <div class="card">
            <h3 style="margin:0 0 16px 0;color:#fff;">Onboarding & Paperwork</h3>
            <p style="font-size:13px;color:var(--muted);margin-top:0;">Securely upload W-9s, Insurance COIs, or signed work orders directly to your project file.</p>
            <div class="doc-upload-area" onclick="document.getElementById('fileInput').click()">
                <div style="font-size:32px;">📄</div>
                <p>Click here to select a document</p>
                <div class="upload-btn">Browse Files</div>
                <input type="file" id="fileInput" style="display:none;" onchange="handleFileUpload(event)">
            </div>
        </div>

        <div class="card">
            <h3 style="margin:0 0 16px 0;color:#fff;">Direct Secure Comms</h3>
            <div id="chatBox" class="chat-box">Loading communications...</div>
            <div class="chat-input-wrapper">
                <input type="text" id="chatInput" class="chat-input" placeholder="Type your message here..." onkeypress="if(event.key==='Enter') sendClientMessage()">
                <button class="chip" onclick="sendClientMessage()">Send</button>
            </div>
        </div>
    `;
}

// ---- FILE UPLOADS (DOCUMENTS) ----
async function handleFileUpload(event) {
    const file = event.target.files[0];
    if(!file) return;
    
    if (!storage) return alert("Storage is not configured correctly.");
    
    try {
        const storageRef = storage.ref(`jobs/${JOB_ID}/documents/${Date.now()}_${file.name}`);
        const snapshot = await storageRef.put(file);
        const downloadURL = await snapshot.ref.getDownloadURL();
        
        const messageText = `📁 Uploaded Document: ${file.name}\nLink: ${downloadURL}`;
        
        // Log to Client Chat
        await db.ref(`jobs/${JOB_ID}/clientComms`).push({
            text: messageText, uid: "client", byName: "Vendor / Partner", ts: Date.now()
        });

        // Ping Internal Command Center
        await db.ref(`jobs/${JOB_ID}/messages`).push({
            text: `📁 Document Uploaded on Fulfillment Portal: ${file.name}\nLink: ${downloadURL}\nPortal: ${PORTAL_URL}`,
            type: 'tech', uid: 'client', byName: 'Fulfillment Portal', ts: Date.now()
        });

        alert(`File "${file.name}" received securely.`);
    } catch(e) {
        console.error(e);
        alert("File upload failed. Check your Firebase Storage configuration.");
    } finally {
        event.target.value = ''; 
    }
}

// ---- PHOTO UPLOADS & GALLERY ----
async function handlePhotoUpload(event) {
    const file = event.target.files[0];
    if(!file) return;
    const stage = document.getElementById('photoStage').value;
    
    if (!storage) return alert("Storage is not configured correctly.");

    const gallery = document.getElementById('photoGallery');
    const tempId = 'loading-' + Date.now();
    gallery.innerHTML = `<div id="${tempId}" class="photo-thumb" style="display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.05);color:var(--accent);font-size:11px;font-weight:700;">Uploading...</div>` + gallery.innerHTML;

    try {
        const storageRef = storage.ref(`jobs/${JOB_ID}/photos/${Date.now()}_${file.name}`);
        const snapshot = await storageRef.put(file);
        const downloadURL = await snapshot.ref.getDownloadURL();
        
        // Save to Photo Gallery DB
        await db.ref(`jobs/${JOB_ID}/photos`).push({
            url: downloadURL, stage: stage, ts: Date.now(), name: file.name
        });
        
        // Log to Client Chat
        await db.ref(`jobs/${JOB_ID}/clientComms`).push({
            text: `📸 Uploaded ${stage} Photo.\nLink: ${downloadURL}`,
            uid: "client", byName: "Vendor / Partner", ts: Date.now()
        });

        // Ping Internal Command Center
        await db.ref(`jobs/${JOB_ID}/messages`).push({
            text: `📸 ${stage} Photo Uploaded by Field Tech/Vendor!\nView Image: ${downloadURL}\nPortal: ${PORTAL_URL}`,
            type: 'tech', uid: 'client', byName: 'Fulfillment Portal', ts: Date.now()
        });

    } catch(e) {
        console.error(e);
        alert("Photo upload failed. Check your Firebase Storage configuration.");
        const loader = document.getElementById(tempId);
        if(loader) loader.remove();
    } finally {
        event.target.value = ''; 
    }
}

function loadPhotos() {
    db.ref(`jobs/${JOB_ID}/photos`).on('value', snap => {
        const photos = snap.val() || {};
        const gallery = document.getElementById('photoGallery');
        if(!gallery) return;

        if(!Object.keys(photos).length) {
            gallery.innerHTML = `<div style="grid-column:1/-1;font-size:12px;color:var(--muted);">No photos uploaded yet. Use the upload button above.</div>`;
            return;
        }

        let html = '';
        Object.values(photos).sort((a,b) => b.ts - a.ts).forEach(p => {
            html += `
            <div class="photo-thumb">
                <a href="${esc(p.url)}" target="_blank">
                    <img src="${esc(p.url)}" loading="lazy" />
                </a>
                <div class="photo-label">${esc(p.stage)}</div>
            </div>`;
        });
        gallery.innerHTML = html;
    });
}

// ---- CLIENT CHAT ----
function loadChat() {
    db.ref(`jobs/${JOB_ID}/clientComms`).on('value', (snap) => {
        const msgs = snap.val() || {};
        const box = document.getElementById('chatBox');
        if(!box) return;

        if(!Object.keys(msgs).length) {
            box.innerHTML = `<div style="text-align:center;color:var(--muted);margin-top:20px;">No messages yet. Send a message to alert the Project Manager.</div>`;
            return;
        }

        let html = "";
        Object.values(msgs).sort((a,b) => a.ts - b.ts).forEach(m => {
            const mine = m.uid === "client";
            html += `
            <div class="chat-item ${mine ? 'chat-me' : 'chat-them'}">
                <div style="font-size:10px;opacity:0.7;margin-bottom:4px;"><b>${esc(m.byName)}</b> • ${new Date(m.ts).toLocaleTimeString()}</div>
                <div>${window.linkify(esc(m.text))}</div>
            </div>`;
        });
        box.innerHTML = html;
        box.scrollTop = box.scrollHeight;
    });
}

function sendClientMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if(!text) return;

    input.disabled = true;
    db.ref(`jobs/${JOB_ID}/clientComms`).push({
        text: text,
        uid: "client",
        byName: "Vendor / Partner",
        ts: Date.now()
    }).then(() => {
        input.value = "";
        input.disabled = false;
        input.focus();
    }).catch(e => {
        alert("Failed to send message. Please try again.");
        input.disabled = false;
    });
}
</script>
</body>
</html>
