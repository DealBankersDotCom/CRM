<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>DealBankers • Network</title>
<link rel="icon" type="image/jpeg" href="icon (1).jpg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet" />
<style>
:root{
  --bg1:#0b131b;--bg2:#142838;--bg3:#173c53;
  --line:#254a63;--text:#f1f7fb;--muted:#c5d3e1;--accent:#2b74ff;
  --good:#00ff6a; --warn:#ffd24d; --bad:#ff5555; --hot:#ff2a2a; --batman:#eab308;
  --shadow:0 28px 70px rgba(0,0,0,.55);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  margin:0;font-family:Inter,system-ui,Arial;color:var(--text);
  background:
    radial-gradient(circle at 18% 20%, rgba(43,116,255,.18), transparent 55%),
    radial-gradient(circle at 85% 25%, rgba(255,42,.12), transparent 55%),
    linear-gradient(135deg,var(--bg1),var(--bg2) 50%,var(--bg3));
  min-height:100vh;
}
.header{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.2);background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.03));position:sticky;top:0;z-index:50;backdrop-filter:blur(10px)}
.header.leftTitle{display:flex;align-items:center;gap:10px;font-weight:900;letter-spacing:.04em}
.header.leftTitle small{display:block;font-weight:600;opacity:.75}
.nav{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.chip{padding:6px 14px;border-radius:100px;border:1px solid rgba(255,255,255,.22);background:#0d1823;color:var(--text);text-decoration:none;cursor:pointer;font-weight:800;transition:.2s;user-select:none}
.chip:hover{background:#14314d;transform:translateY(-1px)}
.chip.primary{background:#133e6a}
.chip.active{background:linear-gradient(180deg,#2b74ff,#0a58ca);color:#fff;border-color:var(--accent)}
.wrap{max-width:1400px;margin:0 auto;padding:16px}
.card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:20px;box-shadow:var(--shadow);overflow:hidden}
.top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.18);background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02))}
.body{padding:16px;display:grid;grid-template-columns:360px 1fr 320px;gap:16px}
@media(max-width:1200px){.body{grid-template-columns:320px 1fr}.col-insights{display:none}}
@media(max-width:900px){.body{grid-template-columns:1fr}}
.panel{border-radius:16px;border:1px solid rgba(255,255,255,.14);background:#0b1825;overflow:hidden;display:flex;flex-direction:column}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:12px;border-bottom:1px solid rgba(255,255,255,.12);background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02))}
.panel-title{font-weight:900;letter-spacing:.1em;font-size:12px;color:#cfe3ff;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.pill{font-size:11px;padding:3px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.16);background:rgba(0,0,0,.18);color:#9ab9d6}
.panel-body{padding:14px;overflow:auto;flex:1}
.input{width:100%;background:#0d1f2d;border:1px solid #254a63;color:#fff;border-radius:12px;padding:9px 10px;outline:none}
.input:focus{border-color:rgba(43,116,255,.6);box-shadow:0 0 0 3px rgba(43,116,255,.12)}

/* Directory */
.dir-search{display:flex;gap:8px;margin-bottom:12px}
.dir-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.dir-filters.chip{font-size:11px;padding:4px 10px}
.dir-list{display:flex;flex-direction:column;gap:8px}
.dir-item{padding:10px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);cursor:pointer;display:flex;gap:10px;align-items:center;transition:.15s}
.dir-item:hover{background:rgba(255,255,255,.07);border-color:rgba(43,116,255,.4);transform:translateY(-1px)}
.dir-item.selected{background:rgba(43,116,255,.18);border-color:var(--accent)}
.dir-avatar{width:44px;height:44px;border-radius:50%;background:#133e6a;display:flex;align-items:center;justify-content:center;font-weight:900;flex-shrink:0;position:relative;border:2px solid rgba(255,255,255,.15)}
.dir-avatar.online::after{content:'';position:absolute;bottom:0;right:0;width:12px;height:12px;background:var(--good);border:2px solid #0b1825;border-radius:50%}
.dir-meta{flex:1;min-width:0}
.dir-name{font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dir-sub{font-size:12px;color:var(--muted);display:flex;gap:8px;align-items:center}
.score{margin-left:auto;font-size:11px;font-weight:900;padding:4px 8px;border-radius:8px;background:rgba(43,116,255,.2);color:#cfe6ff;border:1px solid rgba(43,116,255,.4)}

/* Profile Card */
.profile-hero{position:relative;padding:24px;background:linear-gradient(135deg,rgba(43,116,255,.15),rgba(0,0,0,.2));border-bottom:1px solid rgba(255,255,255,.1)}
.profile-top{display:flex;gap:18px;align-items:flex-start}
.profile-avatar{width:88px;height:88px;border-radius:20px;background:#133e6a;border:3px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;flex-shrink:0;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.profile-info{flex:1}
.profile-name{font-size:26px;font-weight:900;letter-spacing:-.02em;margin-bottom:4px}
.profile-role{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.role-badge{font-size:11px;padding:4px 10px;border-radius:999px;background:rgba(43,116,255,.2);border:1px solid var(--accent);color:#cfe6ff;font-weight:800}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
.status-dot.online{background:var(--good);box-shadow:0 0 8px var(--good)}
.profile-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}

/* Stats Grid */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
@media(max-width:600px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px;text-align:center}
.stat-value{font-size:22px;font-weight:900;color:#fff;line-height:1}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
.stat-trend{font-size:10px;margin-top:2px}
.trend-up{color:var(--good)}.trend-down{color:var(--bad)}

/* Relationship Meter */
.rel-meter{margin:16px 0;padding:16px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.08);border-radius:14px}
.rel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.rel-title{font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:#cfe3ff}
.rel-score{font-size:24px;font-weight:900;color:var(--accent)}
.rel-bar{height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;position:relative}
.rel-fill{height:100%;background:linear-gradient(90deg,var(--accent),#5b9aff);border-radius:4px;transition:width.5s ease;position:relative}
.rel-fill::after{content:'';position:absolute;top:0;right:0;bottom:0;width:40px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3))}
.rel-factors{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px}
.factor{display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.factor:last-child{border:none}
.factor-label{color:var(--muted)}.factor-value{font-weight:700}

/* Insights */
.insight-card{background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.25);border-radius:12px;padding:12px;margin-bottom:10px}
.insight-title{font-weight:800;font-size:12px;color:var(--warn);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.insight-text{font-size:13px;line-height:1.4;color:#ffe3b3}

/* Activity */
.activity-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.activity-item:last-child{border:none}
.activity-icon{width:28px;height:28px;border-radius:8px;background:rgba(43,116,255,.15);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.activity-content{flex:1}
.activity-text{font-size:13px;line-height:1.3}
.activity-time{font-size:11px;color:var(--muted);margin-top:2px}

.btn{padding:8px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:#0d1823;color:#fff;font-weight:800;cursor:pointer;transition:.15s;font-size:13px}
.btn:hover{background:#14314d;transform:translateY(-1px)}
.btn.primary{background:linear-gradient(180deg,#2b74ff,#0a58ca);border-color:var(--accent)}
.btn.ghost{background:transparent}
</style>
</head>
<body>
<div class="header">
  <div class="leftTitle">
    <img src="icon (1).jpg" style="width:32px;height:32px;border-radius:8px">
    <div>DEALBANKERS<small>NETWORK</small></div>
  </div>
  <div class="nav">
    <a href="wholesaler.html" class="chip">Wholesaler</a>
    <a href="network.html" class="chip primary">Network</a>
    <a href="dispo.html" class="chip">Dispo</a>
    <span class="pill" id="networkCount">0 connections</span>
  </div>
</div>

<div class="wrap">
  <div class="card">
    <div class="top">
      <div style="display:flex;gap:10px;align-items:center">
        <div class="seg" id="viewSeg">
          <button class="active" data-view="all">All</button>
          <button data-view="online">Online</button>
          <button data-view="suggested">Suggested</button>
          <button data-view="top">Top</button>
        </div>
      </div>
      <div class="status" id="algoStatus">Network • Private Connections</div>
    </div>

    <div class="body">
      <!-- LEFT: Directory -->
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">◉ Directory</div>
          <span class="pill" id="dirCount">0</span>
        </div>
        <div class="panel-body">
          <div class="dir-search">
            <input id="searchInput" class="input" placeholder="Search name, role, market...">
          </div>
          <div class="dir-filters">
            <button class="chip active" data-filter="all">All</button>
            <button class="chip" data-filter="wholesaler">Wholesalers</button>
            <button class="chip" data-filter="buyer">Buyers</button>
            <button class="chip" data-filter="manager">Managers</button>
          </div>
          <div class="dir-list" id="dirList"></div>
        </div>
      </div>

      <!-- CENTER: Profile -->
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">★ Profile</div>
          <span class="pill" id="profileStatus">Select user</span>
        </div>
        <div class="panel-body" id="profileBody" style="padding:0">
          <div style="padding:40px;text-align:center;color:var(--muted)">
            <div style="font-size:48px;margin-bottom:12px">◯</div>
            <div>Select a connection to view profile</div>
          </div>
        </div>
      </div>

      <!-- RIGHT: Insights -->
      <div class="panel col-insights">
        <div class="panel-head">
          <div class="panel-title">⚡ Activity</div>
        </div>
        <div class="panel-body">
          <div id="insightsList"></div>

          <div style="margin-top:20px">
            <div class="panel-title" style="margin-bottom:10px">Recent Activity</div>
            <div id="activityFeed"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
// Firebase init (use your config)
const firebaseConfig = { /* your config */ };
if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);

const PRESENCE_PATH = "presence/global";
const USER_DIR_PATH = "users";
const ROLES_PATH = "roles";

let currentUser = null;
let allUsers = [];
let selectedUid = null;

function initials(name){return (name||'?').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()}

// Calculate relationship score (placeholder for your algo)
function calcRelationshipScore(user, me){
  const lastActive = user.lastActive || 0;
  const daysSince = (Date.now() - lastActive) / 86400000;
  const recency = Math.max(0, 100 - daysSince*2);
  const mutualDeals = Math.floor(Math.random()*12);
  const responseTime = 15 + Math.random()*45;
  const mutualConnections = Math.floor(Math.random()*8);

  const score = Math.round(
    recency*0.3 +
    Math.min(100, mutualDeals*8)*0.25 +
    Math.max(0, 100-responseTime)*0.25 +
    Math.min(100, mutualConnections*12)*0.2
  );

  return {
    total: Math.min(99, score),
    factors: {
      recency: Math.round(recency),
      deals: mutualDeals,
      response: Math.round(responseTime),
      mutuals: mutualConnections,
      trust: Math.round(60 + Math.random()*35)
    }
  };
}

function renderDirectory(){
  const list = document.getElementById('dirList');
  const q = (document.getElementById('searchInput').value||'').toLowerCase();
  const view = document.querySelector('#viewSeg button.active')?.dataset.view || 'all';

  let users = [...allUsers].filter(u=>u.uid!==currentUser?.uid);

  if(q) users = users.filter(u=>`${u.name} ${u.email} ${u.role}`.toLowerCase().includes(q));
  if(view==='online') users = users.filter(u=>u.online);
  if(view==='top') users = users.sort((a,b)=>b.score.total - a.score.total).slice(0,20);
  if(view==='suggested') users = users.filter(u=>u.score.total>60 && u.score.total<85).sort((a,b)=>b.score.factors.mutuals - a.score.factors.mutuals);

  document.getElementById('dirCount').textContent = users.length;
  document.getElementById('networkCount').textContent = `${allUsers.length-1} connections`;

  list.innerHTML = users.map(u=>`
    <div class="dir-item ${u.uid===selectedUid?'selected':''}" data-uid="${u.uid}">
      <div class="dir-avatar ${u.online?'online':''}">${initials(u.name)}</div>
      <div class="dir-meta">
        <div class="dir-name">${u.name}</div>
        <div class="dir-sub">
          <span>${u.role}</span>
          <span>•</span>
          <span>${u.online?'online':Math.floor((Date.now()-u.lastActive)/3600000)+'h ago'}</span>
        </div>
      </div>
      <div class="score">${u.score.total}</div>
    </div>
  `).join('');

  list.querySelectorAll('.dir-item').forEach(el=>{
    el.onclick = ()=> selectUser(el.dataset.uid);
  });
}

function selectUser(uid){
  selectedUid = uid;
  const user = allUsers.find(u=>u.uid===uid);
  if(!user) return;

  document.querySelectorAll('.dir-item').forEach(el=>el.classList.toggle('selected', el.dataset.uid===uid));
  document.getElementById('profileStatus').textContent = user.online? 'Online now' : 'Offline';

  const score = user.score;
  const profileHTML = `
    <div class="profile-hero">
      <div class="profile-top">
        <div class="profile-avatar">${initials(user.name)}</div>
        <div class="profile-info">
          <div class="profile-name">${user.name}</div>
          <div class="profile-role">
            <span class="role-badge">${user.role.toUpperCase()}</span>
            <span class="status-dot ${user.online?'online':''}"></span>
            <span style="font-size:12px;color:var(--muted)">${user.online?'Active now':`Last seen ${Math.floor((Date.now()-user.lastActive)/3600000)}h ago`}</span>
          </div>
          <div class="profile-actions">
            <button class="btn primary" onclick="messageUser('${uid}')">Message</button>
            <button class="btn" onclick="viewDeals('${uid}')">View Deals</button>
            <button class="btn ghost" onclick="connectUser('${uid}')">Connect</button>
          </div>
        </div>
      </div>
    </div>

    <div style="padding:16px">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value">${score.factors.deals}</div>
          <div class="stat-label">Mutual Deals</div>
          <div class="stat-trend trend-up">+2 this month</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${user.online?'Online':'Offline'}</div>
          <div class="stat-label">Status</div>
          <div class="stat-trend">${Math.floor((Date.now()-user.lastActive)/3600000)}h ago</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${score.factors.mutuals}</div>
          <div class="stat-label">Mutuals</div>
          <div class="stat-trend">Network</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${score.factors.trust}%</div>
          <div class="stat-label">Trust Score</div>
          <div class="stat-trend trend-up">High</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${user.dealsClosed||Math.floor(Math.random()*24)}</div>
          <div class="stat-label">Deals Closed</div>
          <div class="stat-trend">YTD</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${Math.floor(Math.random()*5)+1}.${Math.floor(Math.random()*9)}</div>
          <div class="stat-label">Rating</div>
          <div class="stat-trend trend-up">★</div>
        </div>
      </div>

      <div class="rel-meter">
        <div class="rel-header">
          <div class="rel-title">Connection</div>
          <div class="rel-score" style="font-size:14px;color:var(--muted)">Private</div>
        </div>
        <div style="text-align:center;padding:12px;color:var(--muted);font-size:13px">Detailed analytics available in War Room</div>
      </div>
    </div>
  `;

  document.getElementById('profileBody').innerHTML = profileHTML;

  // Insights hidden from public - moved to War Room
  document.getElementById('insightsList').innerHTML = `
    <div style="text-align:center;padding:20px;color:var(--muted)">
      <div style="font-size:24px;margin-bottom:8px">🔒</div>
      <div style="font-size:13px">Advanced matching available in War Room</div>
    </div>
  `;
}

function loadNetwork(){
  firebase.database().ref(PRESENCE_PATH).on('value', snap=>{
    const presence = snap.val()||{};
    firebase.database().ref(USER_DIR_PATH).once('value').then(usnap=>{
      const users = usnap.val()||{};
      allUsers = Object.keys({...presence,...users}).map(uid=>{
        const p = presence[uid]||{};
        const u = users[uid]||{};
        const user = {
          uid,
          name: u.name || u.displayName || p.name || 'Unknown',
          email: u.email || p.email || '',
          role: u.role || 'user',
          online:!!p.online,
          lastActive: p.ts || 0,
          dealsClosed: u.dealsClosed || 0
        };
        user.score = calcRelationshipScore(user, currentUser);
        return user;
      });
      renderDirectory();
      updateActivity();
    });
  });
}

function updateActivity(){
  const activities = allUsers.filter(u=>u.online).slice(0,5).map(u=>({
    icon:'🟢',
    text:`${u.name} came online`,
    time:'now'
  })).concat([
    {icon:'🤝',text:'New connection: Sarah & Mike',time:'12m'},
    {icon:'💰',text:'Deal closed: $245K in Dallas',time:'24m'},
    {icon:'📈',text:'Network strength +3.2%',time:'1h'}
  ]);

  document.getElementById('activityFeed').innerHTML = activities.map(a=>`
    <div class="activity-item">
      <div class="activity-icon">${a.icon}</div>
      <div class="activity-content">
        <div class="activity-text">${a.text}</div>
        <div class="activity-time">${a.time} ago</div>
      </div>
    </div>
  `).join('');
}

function messageUser(uid){ alert('Opening DM to '+uid); }
function viewDeals(uid){ alert('Viewing deals for '+uid); }
function connectUser(uid){ alert('Connection request sent'); }

// Init
firebase.auth().onAuthStateChanged(u=>{
  if(!u) return location.href='index.html';
  currentUser = u;
  loadNetwork();

  document.getElementById('searchInput').oninput = renderDirectory;
  document.querySelectorAll('#viewSeg button').forEach(b=>{
    b.onclick = ()=>{ document.querySelectorAll('#viewSeg button').forEach(x=>x.classList.remove('active')); b.classList.add('active'); renderDirectory(); }
  });
  document.querySelectorAll('.dir-filters.chip').forEach(c=>{
    c.onclick = ()=>{ document.querySelectorAll('.dir-filters.chip').forEach(x=>x.classList.remove('active')); c.classList.add('active'); renderDirectory(); }
  });
});
</script>
</body>
</html>
