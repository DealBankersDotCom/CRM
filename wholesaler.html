<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,interactive-widget=resizes-content" />
<title>DealBankers • Wholesaler</title>
<link rel="icon" type="image/jpeg" href="icon (1).jpg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet" />
<style>
:root{
  --bg1:#0b131b;--bg2:#142838;--bg3:#173c53;
  --line:#254a63;--text:#f1f7fb;--muted:#c5d3e1;--accent:#2b74ff;
  --good:#00ff6a; --warn:#ffd24d; --bad:#ff5555; --hot:#ff2a2a; --batman:#eab308;
  --shadow:0 28px 70px rgba(0,0,0,.55);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  margin:0;font-family:Inter,system-ui,Arial;color:var(--text);
  background:
    radial-gradient(circle at 18% 20%, rgba(43,116,255,.18), transparent 55%),
    radial-gradient(circle at 85% 25%, rgba(255,42,42,.12), transparent 55%),
    linear-gradient(135deg,var(--bg1),var(--bg2) 50%,var(--bg3));
  min-height:100vh;
}
.header{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.2);
  background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.03));
  position:sticky;top:0;z-index:50;backdrop-filter: blur(10px);
}
.header .leftTitle{display:flex;align-items:center;gap:10px;font-weight:900;letter-spacing:.04em}
.header .leftTitle small{display:block;font-weight:600;opacity:.75;letter-spacing:.02em}
.nav{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.chip{
  padding:6px 14px;border-radius:100px;border:1px solid rgba(255,255,255,.22);
  background:#0d1823;color:var(--text);text-decoration:none;cursor:pointer;font-weight:800;
  transition:background .2s,transform .2s,border-color .2s, box-shadow .2s;user-select:none;
}
.chip:hover{background:#14314d;transform:translateY(-1px)}
.chip.primary{background:#133e6a}
.chip.danger{background:#6b1111;border-color:rgba(255,85,85,.55)}
.icon-btn{
  background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);
  border-radius:50%;width:34px;height:34px;font-size:18px;color:white;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .15s ease, background .15s ease;
}
.icon-btn:hover{background:rgba(255,255,255,0.20);transform:translateY(-1px)}
.icon-btn.mini{width:28px;height:28px;font-size:14px}
.phone-chip{width:48px;height:48px;border-radius:999px;border:1px solid rgba(255,255,255,.24);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:28px;font-weight:900;line-height:1;color:#fff;padding:0;box-shadow:0 10px 24px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.16);transition:transform .15s ease, filter .15s ease, box-shadow .15s ease}
.phone-chip:hover{transform:translateY(-1px) scale(1.03);filter:brightness(1.06)}
.phone-chip:active{transform:translateY(0) scale(.98)}
.blue-phone{background:linear-gradient(180deg,#2b74ff,#0a58ca);box-shadow:0 0 18px rgba(43,116,255,.42), 0 10px 24px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.16)}
.red-phone{background:linear-gradient(180deg,#d92626,#8f1010);box-shadow:0 0 18px rgba(255,42,42,.36), 0 10px 24px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.16)}
.wrap{max-width:1280px;margin:0 auto;padding:16px}
.card{
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);
  border-radius:20px;box-shadow:var(--shadow);overflow:hidden;
}
.top{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.18);
  background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
}
.seg{display:flex;border:1px solid rgba(255,255,255,.22);border-radius:999px;overflow:hidden}
.seg button{padding:8px 14px;border:0;background:#0e2332;color:#cfe6ff;cursor:pointer;font-weight:900}
.seg button.active{background:linear-gradient(180deg,#2b74ff,#0a58ca);color:#fff}
.status{font-size:12px;color:#9ab9d6}
.body{padding:14px;display:grid;grid-template-columns: 320px minmax(0,1fr) 360px;gap:16px;}
@media(max-width:1180px){ .body{grid-template-columns: 300px minmax(0,1fr)} .col-right{display:none} }
@media(max-width:960px){ .body{grid-template-columns: 1fr} .col-right{display:block} }
.panel{border-radius:16px;border:1px solid rgba(255,255,255,.14);background:#0b1825;overflow:hidden;}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:12px 12px;border-bottom:1px solid rgba(255,255,255,.12);background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));}
.panel-title{font-weight:900;letter-spacing:.12em;font-size:12px;color:#cfe3ff;display:flex;align-items:center;gap:10px;text-transform:uppercase;}
.pill{font-size:11px;padding:3px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.16);background:rgba(0,0,0,.18);color:#9ab9d6;white-space:nowrap;}
.panel-body{padding:12px}
.input{width:100%;background:#0d1f2d;border:1px solid #254a63;color:#fff;border-radius:12px;padding:9px 10px;outline:none;}
.input:focus{border-color:rgba(43,116,255,.6);box-shadow:0 0 0 4px rgba(43,116,255,.12)}
.input:disabled{opacity:0.6;cursor:not-allowed;}
.row{display:flex;gap:10px;align-items:center}
.row.wrap{flex-wrap:wrap}
.help{font-size:12px;color:#9ab9d6}
.badge{font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid rgba(255,255,255,.2);background:#0d1823}
.badge.live{background:rgba(0,255,106,.15);border-color:rgba(0,255,106,.45);color:#b8ffcf}
.badge.pending{background:rgba(255,210,77,.15);border-color:rgba(255,210,77,.45);color:#ffe9a6}
.lead-list{display:flex;flex-direction:column;gap:10px;max-height:calc(100vh - 260px);overflow:auto;padding-right:6px}
.lead-item{padding:12px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10);cursor:pointer;transition:transform.1s ease, background.1s ease, border-color.1s ease}
.lead-item:hover{transform:translateY(-1px);background:rgba(255,255,255,.08);border-color:rgba(43,116,255,.35)}
.lead-item.selected{outline:2px solid rgba(43,116,255,.55);background:rgba(43,116,255,.12)}
.lead-top{display:flex;justify-content:space-between;gap:8px;align-items:center}
.lead-title{font-weight:900;letter-spacing:.01em}
.lead-sub{font-size:12px;color:#a9bed1;margin-top:4px;display:flex;gap:8px;flex-wrap:wrap}
.lead-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.mini{font-size:11px;padding:2px 8px;border-radius:999px;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.2);color:#cfe3ff}
.detail-head{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.detail-title{font-size:20px;font-weight:900;letter-spacing:.01em}
.detail-sub{font-size:12px;color:#9ab9d6;margin-top:2px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:860px){.grid-2{grid-template-columns:1fr} }
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11px;color:#9ab9d6;text-transform:uppercase;letter-spacing:.08em}
.kv{display:flex;justify-content:space-between;gap:10px;padding:8px 10px;background:#0b1a26;border:1px solid #1a3a52;border-radius:10px}
.kv span:first-child{color:#9ab9d6;font-size:12px}
.kv span:last-child{font-weight:700}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:8px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:#0d1823;color:#fff;font-weight:800;cursor:pointer}
.btn:hover{background:#14314d}
.btn.primary{background:linear-gradient(180deg,#2b74ff,#0a58ca);border-color:#2b74ff}
.btn.good{background:linear-gradient(180deg,#00c851,#00963f);border-color:#00c851}
.btn.warn{background:linear-gradient(180deg,#ffb020,#d18d00);border-color:#ffb020;color:#1a1200}
.btn.bad{background:linear-gradient(180deg,#ff4d4d,#c41e1e);border-color:#ff4d4d}
.divider{height:1px;background:rgba(255,255,255,.12);margin:12px 0}
.chat-list{display:flex;flex-direction:column;gap:8px;max-height:300px;overflow:auto}
.chat-item{padding:8px 10px;border-radius:10px;background:#0b1a26;border:1px solid #1a3a52;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.chat-item:hover{background:#0f2232}
.chat-item.name{font-weight:700}
.chat-item.meta{font-size:11px;color:#9ab9d6}
.chat-window{display:flex;flex-direction:column;height:360px;border:1px solid #1a3a52;border-radius:12px;overflow:hidden;background:#07121a}
.chat-msgs{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:78%;padding:8px 10px;border-radius:12px;font-size:13px;line-height:1.3}
.msg.me{align-self:flex-end;background:#133e6a;border:1px solid #2b74ff}
.msg.them{align-self:flex-start;background:#0d1f2d;border:1px solid #254a63}
.chat-input{display:flex;gap:8px;padding:8px;border-top:1px solid #1a3a52;background:#0b1825}
.chat-input input{flex:1}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal-backdrop.show{display:flex}
.modal{width:min(900px,95vw);max-height:90vh;overflow:auto;background:#0b1825;border:1px solid rgba(255,255,255,.18);border-radius:16px;box-shadow:var(--shadow)}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.12);background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02))}
.modal-title{font-weight:900;letter-spacing:.06em}
.modal-body{padding:14px}
.close-x{background:transparent;border:0;color:#fff;font-size:22px;cursor:pointer}
#btnApprovals { background: rgba(255,42,42,.15); border-color: rgba(255,42,42,.4); }
#btnApprovals:hover { background: rgba(255,42,42,.25); transform:translateY(-1px); }
</style>
</head>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAoidTI8",
  authDomain: "dealbankers-",
  databaseURL: "https://dealbankers-",
  projectId: "dealbankers-",
  storageBucket: "dealbankers-.appspot.com",
  messagingSenderId: "",
  appId: "1::web:"
};
if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);

const $ = id => document.getElementById(id);
const LEADS_MASTER_PATH = "leadsMaster";
const USER_DIR_PATH = "users";
const ROLES_PATH = "roles";
const PRESENCE_PATH = "presence/global";
const DMS_PATH = "dms";
const MANAGER_ASSOCIATES_PATH = "managerAssociates";

window.UID = null;
window.ME = null;
window.ROLE = "user";
window.isGod = false;
window.isBranchManager = false;
window.currentCategory = "sellers";
window.selectedLeadId = null;
window.leadsCache = { sellers: {}, buyers: {} };
window.userDirCache = { byUid: {}, byEmail: {} };
window.pendingApprovals = [];
window.pendingRequestCache = [];

window.roleLabel = r => ({god:"GOD",admin:"BRANCH MANAGER",user:"ASSOCIATE"}[r]||"USER");
window.isAdminLike = () => window.isGod || window.isBranchManager;

window.trackPresence = function(user){
  const ref = firebase.database().ref(`${PRESENCE_PATH}/${user.uid}`);
  const data = {
    uid: user.uid,
    name: user.displayName || user.email.split('@')[0],
    email: user.email,
    online: true,
    ts: firebase.database.ServerValue.TIMESTAMP,
    portal: "wholesaler"
  };
  ref.set(data);
  ref.onDisconnect().update({online:false, ts: firebase.database.ServerValue.TIMESTAMP});
};

window.resolveMyRole = async function(user){
  try {
    const snap = await firebase.database().ref(`${ROLES_PATH}/${user.uid}`).once('value');
    return snap.val() || "user";
  } catch(e){ return "user"; }
};

window.upsertMyUserDirectory = async function(user){
  const updates = {};
  updates[`${USER_DIR_PATH}/${user.uid}/email`] = user.email.toLowerCase();
  updates[`${USER_DIR_PATH}/${user.uid}/name`] = user.displayName || user.email.split('@')[0];
  updates[`${USER_DIR_PATH}/${user.uid}/lastSeen`] = firebase.database.ServerValue.TIMESTAMP;
  await firebase.database().ref().update(updates);
};

window.loadUserDirectoryCache = async function(){
  let users={}, roles={}, managerAssociates={}, presence={};
  try{
    const uSnap=await firebase.database().ref(USER_DIR_PATH).once("value"); users=uSnap.val()||{};
  }catch(e){}
  try{
    const rSnap=await firebase.database().ref(ROLES_PATH).once("value"); roles=rSnap.val()||{};
  }catch(e){}
  try{
    const mSnap=await firebase.database().ref(MANAGER_ASSOCIATES_PATH).once("value"); managerAssociates=mSnap.val()||{};
  }catch(e){}
  try{
    const pSnap=await firebase.database().ref(PRESENCE_PATH).once("value"); presence=pSnap.val()||{};
  }catch(e){}

  window.userDirCache.byUid = {};
  Object.keys(users).forEach(uid=>{
    window.userDirCache.byUid[uid] = {
     ...users[uid],
      role: roles[uid] || "user",
      online: presence[uid]?.online || false,
      lastActive: presence[uid]?.ts || 0,
      managerUid: users[uid]?.managerUid || null,
      managerStatus: users[uid]?.managerStatus || null
    };
  });
  window.userDirCache.byEmail = {};
  Object.values(window.userDirCache.byUid).forEach(u=>{
    if(u.email) window.userDirCache.byEmail[u.email.toLowerCase()] = u;
  });
};

window.loadBranchManagerDirectoryCache = async function(){
  await window.loadUserDirectoryCache();
};

window.loadGodDirectoryCache = async function(){
  await window.loadUserDirectoryCache();
  // Build pending requests
  const pending = [];
  const ma = await firebase.database().ref(MANAGER_ASSOCIATES_PATH).once('value');
  const maVal = ma.val() || {};
  Object.keys(maVal).forEach(managerUid=>{
    const team = maVal[managerUid] || {};
    Object.keys(team).forEach(targetUid=>{
      const info = team[targetUid] || {};
      if(info.status === "pending"){
        pending.push({
          id: `${managerUid}_${targetUid}`,
          requesterUid: managerUid,
          targetUid: targetUid,
          requesterName: window.userDirCache.byUid[managerUid]?.name || "Manager",
          targetName: window.userDirCache.byUid[targetUid]?.name || "User",
          ts: info.ts || 0
        });
      }
    });
  });
  window.pendingRequestCache = pending;
};

// REALTIME APPROVAL LISTENER - FIXED
window.initApprovalListener = function() {
    if (!window.isGod) return;
    const btn = $('btnApprovals');
    if (btn) btn.style.display = 'none';

    const updateBadge = () => {
        const count = (window.pendingRequestCache||[]).length + (window.pendingApprovals||[]).length;
        const badge = $('approvalBadge');
        if (btn) btn.style.display = count > 0? 'flex' : 'none';
        if (badge) {
            if (count > 0) {
                badge.style.display = 'inline-block';
                badge.textContent = count;
            } else {
                badge.style.display = 'none';
            }
        }
    };

    const refresh = async () => {
        try {
            await window.loadGodDirectoryCache();
            // scan leads too
            let pending = [];
            try {
                const [ms, mb] = await Promise.all([
                    firebase.database().ref(`${LEADS_MASTER_PATH}/sellers`).once('value'),
                    firebase.database().ref(`${LEADS_MASTER_PATH}/buyers`).once('value')
                ]);
                const check = (val) => { const v = val||{}; Object.keys(v).forEach(k=>{ const l=v[k]; if(l && l.isLive &&!l.dispoApproved) pending.push({...l,id:k}) }) };
                check(ms.val()); check(mb.val());
            } catch(e){}
            window.pendingApprovals = pending;
            updateBadge();
        } catch(e){}
    };

    // Initial load
    refresh();

    // Realtime listeners for instant updates
    firebase.database().ref(MANAGER_ASSOCIATES_PATH).on('value', refresh);
    firebase.database().ref(`${LEADS_MASTER_PATH}/sellers`).on('child_changed', refresh);
    firebase.database().ref(`${LEADS_MASTER_PATH}/buyers`).on('child_changed', refresh);
    firebase.database().ref(`${LEADS_MASTER_PATH}/sellers`).on('child_added', refresh);
    firebase.database().ref(`${LEADS_MASTER_PATH}/buyers`).on('child_added', refresh);
};

window.startRadar = function(){
  if($("radarList")) $("radarList").style.display=""; if($("chatArea")) $("chatArea").style.display="none";
  if($("panelTitle")) $("panelTitle").textContent="Team Radar";
  if($("backToRadar")) $("backToRadar").style.display="none"; const list=$("radarList");
  firebase.database().ref(PRESENCE_PATH).on("value", snap=>{
    const v=snap.val()||{};
    let users=Object.values(v).filter(x=>{
        if(!x||!x.online||String(x.uid||"")===String(window.UID)) return false;
        // Show all online users to everyone - GOD sees all, others see GOD + online team
        return true;
    });
    if(!users.length){ if(list) list.innerHTML=`<div style="padding:20px; text-align:center; color:var(--muted)">No one online</div>`; return; }
    if(list) list.innerHTML = users.map(u=>`
      <div class="chat-item" data-uid="${u.uid}" onclick="window.openDM('${u.uid}','${(u.name||'User').replace(/'/g,"\\'")}')">
        <div>
          <div class="name">${u.name||'User'}</div>
          <div class="meta">${u.portal||'portal'} • online</div>
        </div>
        <div style="width:8px;height:8px;border-radius:50%;background:var(--good)"></div>
      </div>
    `).join('');
  });
};

window.openDM = function(uid,name){
  if($("radarList")) $("radarList").style.display="none";
  if($("chatArea")) $("chatArea").style.display="";
  if($("panelTitle")) $("panelTitle").textContent = name;
  if($("backToRadar")) $("backToRadar").style.display="";
  window.currentDM = uid;
  const path = `${DMS_PATH}/${window.UID}_${uid}/messages`;
  window.setupChat(path, name, true);
  if($("backToRadar")) $("backToRadar").onclick = ()=>{ window.startRadar(); };
};

window.setupChat = function(path, title, isDM){
  const msgsEl = $("chatMsgs");
  if(msgsEl) msgsEl.innerHTML = "";
  firebase.database().ref(path).off();
  firebase.database().ref(path).limitToLast(50).on("child_added", snap=>{
    const m = snap.val();
    if(!m) return;
    const div = document.createElement("div");
    div.className = "msg " + (String(m.from)===String(window.UID)? "me" : "them");
    div.textContent = m.text;
    if(msgsEl){ msgsEl.appendChild(div); msgsEl.scrollTop = msgsEl.scrollHeight; }
  });
  const send = ()=>{
    const inp = $("chatInput");
    const txt = (inp.value||"").trim();
    if(!txt) return;
    firebase.database().ref(path).push({
      from: window.UID,
      text: txt,
      ts: firebase.database.ServerValue.TIMESTAMP
    });
    inp.value = "";
  };
  if($("btnSendChat")) $("btnSendChat").onclick = send;
  if($("chatInput")) $("chatInput").onkeydown = e=>{ if(e.key==="Enter"){ e.preventDefault(); send(); } };
};

// Team Modal with REALTIME
window.openTeamModal = async function(){
  if($("teamModal")) $("teamModal").classList.add("show");
  if($("teamModalBody")) $("teamModalBody").innerHTML="<div class='help'>Loading team directory...</div>";
  await window.renderTeamModalBody();
  // Realtime refresh for branch managers
  if(window.isBranchManager &&!window._teamListenerAttached){
    window._teamListenerAttached = true;
    firebase.database().ref(`${MANAGER_ASSOCIATES_PATH}/${window.UID}`).on('value', async ()=>{
      if($("teamModal") && $("teamModal").classList.contains('show')){
        await window.loadBranchManagerDirectoryCache();
        await window.renderTeamModalBody();
      }
    });
  }
};
window.closeTeamModal = function(){
    if (document.activeElement) document.activeElement.blur();
    if($("teamModal")) $("teamModal").classList.remove("show");
};

window.renderTeamModalBody = async function(){
  await window.loadUserDirectoryCache();
  const body = $("teamModalBody");
  if(!body) return;

  let html = `<div style="margin-bottom:16px">
    <input id="teamSearch" class="input" placeholder="Search users by name or email..." oninput="window.runTeamSearch()">
  </div>
  <div id="teamSearchResults" style="margin-bottom:20px"></div>`;

  if(window.isGod){
    html += `<div class="divider"></div><h3 style="margin:12px 0">Pending Requests (${window.pendingRequestCache.length})</h3><div id="pendingRequests">`;
    if(window.pendingRequestCache.length){
      html += window.pendingRequestCache.map(r=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:rgba(255,255,.04);border-radius:10px;margin-bottom:8px">
          <div><strong>${r.requesterName}</strong> → ${r.targetName}</div>
          <div style="display:flex;gap:6px">
            <button class="btn good" onclick="window.approveRequest('${r.id}')">Approve</button>
            <button class="btn bad" onclick="window.denyRequest('${r.id}')">Deny</button>
          </div>
        </div>
      `).join('');
    } else {
      html += `<div class="help">No pending requests</div>`;
    }
    html += `</div>`;
  }

if(window.isBranchManager){
    const myTeam = Object.values(window.userDirCache.byUid).filter(u=>u.managerUid===window.UID);
    html += `<div class="divider"></div><h3 style="margin:12px 0">My Team (${myTeam.length})</h3>`;
    html += myTeam.map(m=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px;background:rgba(255,255,.03);border-radius:8px;margin-bottom:6px">
        <div>${m.name} <span style="color:var(--muted);font-size:11px">(${m.email})</span></div>
        <button class="btn bad" style="padding:4px 8px;font-size:11px" onclick="window.removeAssociate('${m.uid||m.id}')">Remove</button>
      </div>
    `).join('') || '<div class="help">No team members yet</div>';
  }

  body.innerHTML = html;
  window.runTeamSearch();
};

window.runTeamSearch = async function(){
  const input=$("teamSearch"); const box=$("teamSearchResults"); if(!input||!box) return;
  const q=(input.value||"").toLowerCase().trim();
  if(!q){ box.innerHTML=""; return; }
  await window.loadUserDirectoryCache();
  const results = Object.values(window.userDirCache.byUid).filter(u=>
    u.email?.toLowerCase().includes(q) || u.name?.toLowerCase().includes(q)
  ).slice(0,10);
  box.innerHTML = results.map(u=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px;background:rgba(255,255,.04);border-radius:8px;margin-bottom:6px">
      <div>${u.name} <span style="color:var(--muted);font-size:11px">${u.email}</span></div>
      <button class="btn primary" style="padding:4px 10px;font-size:11px" onclick="window.requestAssociate('${u.uid}','${encodeURIComponent(u.email)}')">Add</button>
    </div>
  `).join('') || '<div class="help">No users found</div>';
};

window.requestAssociate=async function(targetUid,targetEmailEnc){
    if(!targetUid) return;
    const targetEmail=decodeURIComponent(targetEmailEnc||"").toLowerCase();
    const already=window.pendingRequestCache.find(r=>String(r.requesterUid)===String(window.UID)&&String(r.targetUid)===String(targetUid));
    if(already){ alert("Request already pending"); return; }
    try{
        const updates={};
        updates[`${MANAGER_ASSOCIATES_PATH}/${window.UID}/${targetUid}`]={status:"pending",ts:firebase.database.ServerValue.TIMESTAMP,email:targetEmail};
        await firebase.database().ref().update(updates);
        alert("Request sent to GOD for approval");
        try{ await window.loadBranchManagerDirectoryCache(); await window.renderTeamModalBody(); }catch(e){}
    }catch(e){ alert("Failed: "+e.message); }
};

window.approveRequest=async function(requestId){const req=window.pendingRequestCache.find(r=>r.id===requestId); if(!req) return; try{ const updates={}; updates[`${USER_DIR_PATH}/${req.targetUid}/managerUid`]=req.requesterUid; updates[`${USER_DIR_PATH}/${req.targetUid}/managerStatus`]="approved"; updates[`${MANAGER_ASSOCIATES_PATH}/${req.requesterUid}/${req.targetUid}`]={status:"approved",ts:firebase.database.ServerValue.TIMESTAMP}; await firebase.database().ref().update(updates); try{ await window.loadGodDirectoryCache(); await window.renderTeamModalBody(); }catch(e){} }catch(e){ alert("Approve failed"); } };

window.denyRequest=async function(requestId){const req=window.pendingRequestCache.find(r=>r.id===requestId); if(!req) return; try{ const updates={}; updates[`${USER_DIR_PATH}/${req.targetUid}/managerUid`]=null; updates[`${USER_DIR_PATH}/${req.targetUid}/managerStatus`]=null; updates[`${MANAGER_ASSOCIATES_PATH}/${req.requesterUid}/${req.targetUid}`]=null; await firebase.database().ref().update(updates); try{ await window.loadGodDirectoryCache(); await window.renderTeamModalBody(); }catch(e){} }catch(e){ alert("Deny failed"); } };

window.removeAssociate=async function(targetUid){if(!targetUid) return; try{ const managerUid=String(window.userDirCache.byUid[targetUid]?.managerUid||window.UID); const updates={}; updates[`${USER_DIR_PATH}/${targetUid}/managerUid`]=null; updates[`${USER_DIR_PATH}/${targetUid}/managerStatus`]=null; updates[`${MANAGER_ASSOCIATES_PATH}/${managerUid}/${targetUid}`]=null; await firebase.database().ref().update(updates); // instant UI refresh
        try{ await window.loadBranchManagerDirectoryCache(); await window.renderTeamModalBody(); }catch(e){} }catch(e){ alert("Remove failed"); } };

// Lead functions (simplified)
window.loadLeads = async function(){
  const cat = window.currentCategory;
  try{
    const snap = await firebase.database().ref(`${LEADS_MASTER_PATH}/${cat}`).once('value');
    window.leadsCache[cat] = snap.val() || {};
    window.renderLeadList();
  }catch(e){ $("status").textContent = "Error loading"; }
};

window.renderLeadList = function(){
  const list = $("leadList");
  const leads = Object.entries(window.leadsCache[window.currentCategory]||{}).map(([id,d])=>({id,...d}));
  $("leadCount").textContent = leads.length;
  $("status").textContent = `${leads.length} leads`;
  list.innerHTML = leads.map(l=>`
    <div class="lead-item" data-id="${l.id}" onclick="window.selectLead('${l.id}')">
      <div class="lead-top"><div class="lead-title">${l.name||'Unnamed'}</div><span class="badge ${l.isLive?'live':'pending'}">${l.isLive?'LIVE':'NEW'}</span></div>
      <div class="lead-sub"><span>${l.city||''}, ${l.state||''}</span><span>•</span><span>${l.phone||''}</span></div>
    </div>
  `).join('');
};

window.selectLead = function(id){
  window.selectedLeadId = id;
  document.querySelectorAll('.lead-item').forEach(el=>el.classList.toggle('selected', el.dataset.id===id));
  const lead = window.leadsCache[window.currentCategory][id];
  if(!lead) return;
  $("detailStatus").textContent = lead.isLive? "LIVE" : "NEW";
  $("leadDetail").innerHTML = `
    <div class="detail-head">
      <div><div class="detail-title">${lead.name||'Unnamed Lead'}</div><div class="detail-sub">${lead.address||''}</div></div>
    </div>
    <div class="divider"></div>
    <div class="grid-2">
      <div class="field"><label>Phone</label><div class="kv"><span>Mobile</span><span>${lead.phone||'—'}</span></div></div>
      <div class="field"><label>Email</label><div class="kv"><span>Email</span><span>${lead.email||'—'}</span></div></div>
      <div class="field"><label>Price</label><div class="kv"><span>Asking</span><span>$${(lead.price||0).toLocaleString()}</span></div></div>
      <div class="field"><label>Status</label><div class="kv"><span>Stage</span><span>${lead.stage||'New'}</span></div></div>
    </div>
  `;
  $("btnEditLead").style.display = "block";
};

// Init
firebase.auth().onAuthStateChanged(async user=>{
  if(!user) return location.href='index.html';
  window.UID = user.uid;
  window.ME = user;
  await window.upsertMyUserDirectory(user);
  window.trackPresence(user);
  window.ROLE = await window.resolveMyRole(user);
  window.isGod = window.ROLE==="god";
  window.isBranchManager = window.ROLE==="admin";
  $("roleReadout").textContent = `ROLE: ${window.roleLabel(window.ROLE)}`;
  if(window.isGod) window.initApprovalListener();
  window.startRadar();
  window.loadLeads();
  $("btnTeam").onclick = window.openTeamModal;
  $("btnLogout").onclick = ()=>firebase.auth().signOut();
  $("segCategory").querySelectorAll("button").forEach(b=>b.onclick=()=>{ document.querySelectorAll("#segCategory button").forEach(x=>x.classList.remove("active")); b.classList.add("active"); window.currentCategory=b.dataset.cat; window.loadLeads(); });
  $("search").oninput = ()=>window.renderLeadList();
});
</script>
