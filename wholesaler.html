<div id="settingsModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:10000; align-items:center; justify-content:center; backdrop-filter: blur(5px);">
  <div style="background:var(--bg2); border:1px solid var(--cyan); padding:24px; border-radius:8px; width:480px; box-shadow: 0 0 30px rgba(6, 182, 212, 0.3);">
    <h2 style="font-family:'Orbitron', sans-serif; color:var(--cyan); margin-bottom:20px;">WAR ROOM SETTINGS</h2>
    
    <div style="margin-bottom:12px;">
      <label style="display:block; font-family:'JetBrains Mono'; font-size:10px; color:var(--batman); margin-bottom:6px;">TAX ESTATES SHEET URL</label>
      <input type="text" id="set_taxSheet" class="input-tactical" placeholder="Paste Google Sheet URL..." />
    </div>
    
    <div style="margin-bottom:12px;">
      <label style="display:block; font-family:'JetBrains Mono'; font-size:10px; color:var(--batman); margin-bottom:6px;">CUSTOM LEADS MAP URL</label>
      <input type="text" id="set_leadsMap" class="input-tactical" placeholder="Paste Google My Maps URL..." />
    </div>
    
    <div style="margin-bottom:16px;">
      <label style="display:block; font-family:'JetBrains Mono'; font-size:10px; color:var(--batman); margin-bottom:6px;">RPR HUB URL</label>
      <input type="text" id="set_rprHub" class="input-tactical" placeholder="Paste RPR URL..." />
    </div>

    <div style="border-top:1px dashed var(--line); padding-top:16px; margin-bottom:16px;">
      <label style="display:block; font-family:'JetBrains Mono'; font-size:10px; color:var(--batman); margin-bottom:6px;">TARGET MARKET PROFILES</label>
      <div style="display:flex; gap:8px; margin-bottom:12px;">
          <select id="set_marketSelect" class="input-tactical" style="flex:1; cursor:pointer;" onchange="loadSelectedMarket()">
          </select>
          <input type="text" id="set_newMarketName" class="input-tactical" placeholder="Or type new (e.g. FL - Miami)" style="flex:1;" />
      </div>
      <div style="display:flex; gap:12px; margin-bottom:12px;">
        <div style="flex:1;">
          <label style="display:block; font-family:'JetBrains Mono'; font-size:10px; color:var(--muted); margin-bottom:6px;">COUNTY CLERK URL</label>
          <input type="text" id="set_countyClerk" class="input-tactical" placeholder="Paste URL..." />
        </div>
        <div style="flex:1;">
          <label style="display:block; font-family:'JetBrains Mono'; font-size:10px; color:var(--muted); margin-bottom:6px;">APPRAISAL DIST URL</label>
          <input type="text" id="set_appraisalDist" class="input-tactical" placeholder="Paste URL..." />
        </div>
      </div>
      <div style="margin-bottom:12px;">
        <label style="display:block; font-family:'JetBrains Mono'; font-size:10px; color:var(--muted); margin-bottom:6px;">TAX ASSESSOR URL</label>
        <input type="text" id="set_taxAssessor" class="input-tactical" placeholder="Paste URL..." />
      </div>
    </div>
    
    <div style="display:flex; justify-content:flex-end; gap:12px;">
      <button class="btn-nav danger" onclick="document.getElementById('settingsModal').style.display='none'">CANCEL</button>
      <button class="btn-nav" style="border-color:var(--good); color:var(--good);" onclick="saveWarRoomSettings()">SAVE INTEL LINKS</button>
    </div>
  </div>
</div>
</body>
</html>
